name: Deploy to GitHub Pages

# 触发：推送到 main 分支时自动构建并部署；也可在 Actions 页手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 需要写权限，才能把 public/ 推到 gh-pages 分支
permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 构建：SITE_URL 自动用当前仓库拼出 GitHub Pages 地址
      # 普通仓库 -> https://<owner>.github.io/<repo>/
      # 若你的仓库名是 <owner>.github.io（用户页），把下面改成：
      #   SITE_URL: https://${{ github.repository_owner }}.github.io
      - name: Build site
        run: node scripts/build.js
        env:
          SITE_URL: https://promptdazi.eu.org

      # 部署 public/ 到 gh-pages 分支（仓库 Settings → Pages → Source 选 gh-pages 分支）
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
